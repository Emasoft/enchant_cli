name: Tests

on: [push, pull_request]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          additional_args: "--extended-analysis=true"
          scandir: '.'
          # Only fail on error severity issues, with extended analysis
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false # Allow other Python versions to complete if one fails

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Install uv
      run: python -m pip install --upgrade pip uv

    - name: Install dependencies using uv
      run: |
        # Setup virtual environment for isolation
        uv venv .venv
        # Install main dependencies from lock file
        uv sync
        # Install the package itself in editable mode
        uv pip install --system -e .
        # Install bump-my-version with uv tool
        uv tool install bump-my-version

    - name: Run tests with pytest
      env:
        # PYTHONPATH: src # Not needed if using pytest.ini or editable install
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        TEST_ENV: "true"  # Enable test configuration in translator
        PYTHONUTF8: 1 # Ensure UTF-8 mode for Python
      run: |
        # Verify test sample exists (redundant with verify_samples.sh but good check)
        if [ ! -f tests/samples/test_sample.txt ]; then
          echo "❌ Test sample file missing!"
          exit 1
        fi

        # Run pytest with extended timeout
        python -m pytest tests/ -v \
          --cov=enchant_cli \
          --cov-report=xml \
          --cov-report=term-missing:skip-covered \
          --cov-fail-under=80 \
          --strict-markers \
          --durations=10 \
          --timeout=900 # 900 seconds (15 min) timeout per test
      timeout-minutes: 15  # Increase overall test job timeout to 15 minutes
                           # This provides extra margin beyond the per-test timeout

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4 # Use v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Use token from secrets
        # file: ./coverage.xml # Default is ./coverage.xml
        flags: unittests # Flag for categorization in Codecov UI
        fail_ci_if_error: true # Fail workflow if upload error occurs
      env:
         CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # Some actions prefer env var
