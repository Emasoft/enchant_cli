repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7  # Latest version at time of writing
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1 # Use the correct tag format
    hooks:
      - id: shellcheck

