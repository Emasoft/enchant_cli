repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7  # Latest version at time of writing
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 1.3.0
    hooks:
      - id: shellcheck

  # Re-enabled bump-my-version hook to bump minor version on every commit.
  # This will create a commit and tag automatically.
  - repo: https://github.com/callowayproject/bump-my-version
    rev: v1.1.2 # Use a specific recent version
    hooks:
      - id: bump-my-version
        args: [--minor, --commit, --tag, --allow-dirty] # Ensure --minor is present
        exclude: |
          (?x)^(
            .*/_version.py| # Exclude if version is read dynamically elsewhere
            .*bumpversion.cfg| # Config file itself
            .*readme.md| # Documentation
            tests/.* # Test files
          )$
