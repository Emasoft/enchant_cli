style: github
template: |
  {{#if Versions}}
  # Changelog
  
  {{#each Versions}}
  ## {{@key}} ({{formatDate this.Date "2006-01-02"}})

  {{#each this.Commits}}
  - {{#if .Scope}}**{{.Scope}}:** {{/if}}{{.Subject}}{{#if .Body}} - {{trim .Body}}{{/if}}
  {{/each}}

  [Full Changes](https://github.com/Emasoft/enchant_cli/compare/{{@previous}}...{{@current}})

  {{/each}}
  {{/if}}

  _Generated by [git-chglog](https://github.com/git-chglog/git-chglog)_
