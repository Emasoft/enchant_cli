[tool.bumpversion]
current_version = "0.1.0"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
commit = true
tag = true
message = "Bump version: {current_version} → {new_version}"
tag_name = "v{new_version}"
tag_message = "Version {new_version}"

[tool.bumpversion.files]
"src/enchant_cli/__init__.py" = {search = "__version__ = \"{current_version}\"", replace = "__version__ = \"{new_version}\""}
"src/enchant_cli/enchant_cli.py" = [
    {search = "@click.version_option\\(__version__, \"-V\", \"--version\", message=\"%(prog)s v%(version)s\"", replace = "@click.version_option(__version__, \"-V\", \"--version\", message=\"%(prog)s v{new_version}\""} # Keep if desired
]
